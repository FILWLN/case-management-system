<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>еҰ—е ўо…ёз»ҜиҚӨзІә MVP - зҖ№еұҫжҡЈйҗ—?/title>
  <script src="./vue.global.js"></script>
  <link rel="stylesheet" href="./element-plus.css">
  <script src="./element-plus.full.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
    .login-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-box { width: 400px; background: #fff; border-radius: 8px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .login-title { text-align: center; color: #409eff; margin-bottom: 30px; font-size: 24px; }
    .main-layout { height: 100vh; display: flex; }
    .sidebar { background: #304156; color: #fff; width: 220px; flex-shrink: 0; overflow-y: auto; }
    .logo { height: 60px; line-height: 60px; text-align: center; font-size: 18px; font-weight: bold; border-bottom: 1px solid #1f2d3d; background: #263445; }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: all .3s; border-left: 3px solid transparent; }
    .menu-item:hover, .menu-item.active { background: #263445; border-left-color: #409eff; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { height: 60px; background: #fff; box-shadow: 0 1px 4px rgba(0,21,41,.08); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .content { padding: 20px; background: #f5f7fa; flex: 1; overflow-y: auto; }
    .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px 0 rgba(0,0,0,.05); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #ebeef5; }
    .card-header h3 { font-size: 18px; color: #303133; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ebeef5; }
    th { background: #f5f7fa; color: #606266; font-weight: 600; }
    tr:hover { background: #f5f7fa; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
    .tag-primary { background: #ecf5ff; color: #409eff; }
    .tag-success { background: #f0f9eb; color: #67c23a; }
    .tag-warning { background: #fdf6ec; color: #e6a23c; }
    .tag-info { background: #f4f4f5; color: #909399; }
    .tag-danger { background: #fef0f0; color: #f56c6c; }
    .btn { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; transition: all .3s; }
    .btn:hover { opacity: .8; }
    .btn-primary { background: #409eff; color: #fff; }
    .btn-success { background: #67c23a; color: #fff; }
    .btn-warning { background: #e6a23c; color: #fff; }
    .btn-danger { background: #f56c6c; color: #fff; }
    .btn-default { background: #fff; color: #606266; border: 1px solid #dcdfe6; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .search { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    input, select, textarea { padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #409eff; }
    textarea { resize: vertical; min-height: 80px; }
    .fade { color: #909399; font-size: 14px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #606266; font-weight: 500; }
    .form-group label .required { color: #f56c6c; margin-left: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; }
    .form-row { display: flex; gap: 20px; }
    .form-col { flex: 1; }
    .section-title { font-size: 16px; font-weight: 600; color: #303133; margin: 25px 0 15px; padding-left: 10px; border-left: 4px solid #409eff; }
    .section-box { background: #fafafa; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
    .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,.05); }
    .stat-card .number { font-size: 28px; font-weight: bold; color: #409eff; }
    .stat-card .label { font-size: 14px; color: #909399; margin-top: 5px; }
    .stat-card.success .number { color: #67c23a; }
    .stat-card.warning .number { color: #e6a23c; }
    .stat-card.danger .number { color: #f56c6c; }
    .tabs { display: flex; border-bottom: 1px solid #e4e7ed; margin-bottom: 20px; }
    .tab { padding: 12px 20px; cursor: pointer; color: #606266; border-bottom: 2px solid transparent; }
    .tab.active { color: #409eff; border-bottom-color: #409eff; }
    .installment-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; padding: 10px; background: #f5f7fa; border-radius: 4px; }
    .installment-row input, .installment-row select { width: 150px; }
    .mt-10 { margin-top: 10px; }
    .mr-10 { margin-right: 10px; }
    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 20px; }
    .page-btn { padding: 6px 12px; border: 1px solid #dcdfe6; background: #fff; cursor: pointer; border-radius: 4px; }
    .page-btn:disabled { opacity: .5; cursor: not-allowed; }
    .page-btn.active { background: #409eff; color: #fff; border-color: #409eff; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; border-radius: 8px; width: 90%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px; border-bottom: 1px solid #ebeef5; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 15px 20px; border-top: 1px solid #ebeef5; text-align: right; }
    .close-btn { font-size: 24px; color: #909399; cursor: pointer; background: none; border: none; }
    .detail-section { margin-bottom: 25px; }
    .detail-section h4 { font-size: 15px; color: #303133; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #ebeef5; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .detail-item { display: flex; align-items: baseline; font-size: 14px; }
    .detail-item .label { color: #909399; width: 140px; flex-shrink: 0; }
    .detail-item .value { color: #303133; font-weight: 500; }
    .upload-area { border: 2px dashed #dcdfe6; border-radius: 8px; padding: 60px; text-align: center; cursor: pointer; transition: all .3s; }
    .upload-area:hover { border-color: #409eff; background: #f5f7fa; }
  </style>
</head>
<body>
  <div id="app">
    <!-- йҗ§иҜІз¶ҚжӨӨ?-->
    <div v-if="!isLoggedIn" class="login-container">
      <div class="login-box">
        <h2 class="login-title">еҰ—е ўо…ёз»ҜиҚӨзІә MVP</h2>
        <div class="form-group">
          <label>йҗўг„ҰеҹӣйҚҡ?/label>
          <input v-model="loginForm.username" placeholder="з’Үз–Ҝз·ӯйҚҸгғ§ж•ӨйҺҙеі°жӮ•">
        </div>
        <div class="form-group">
          <label>зҖөе—ҷзҲң</label>
          <input v-model="loginForm.password" type="password" placeholder="з’Үз–Ҝз·ӯйҚҸгғҘзҳ‘йҗ®?>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 10px" @click="handleLogin">йҗ§иҜІз¶Қ</button>
        <p style="text-align: center; margin-top: 15px; color: #909399; font-size: 12px">е©•ж—ӮгҒҡз’җп№ҖеҪҝ: admin / admin123</p>
      </div>
    </div>

    <!-- ж¶“е©ҡгҖүй—Ҳ?-->
    <div v-else class="main-layout">
      <!-- жёҡСҶз«ҹйҸҚ?-->
      <div class="sidebar">
        <div class="logo">еҰ—е ўо…ёз»ҜиҚӨзІә</div>
        <div class="menu-item" :class="{active: activeMenu === 'list'}" @click="activeMenu = 'list'">йҰғжҗө еҰ—е ңж¬ўйҚ’жҘ„гҖғ</div>
        <div class="menu-item" :class="{active: activeMenu === 'create'}" @click="activeMenu = 'create'">йүғ?йҸӮжқҝо–ғеҰ—е ңж¬ў</div>
        <div class="menu-item" :class="{active: activeMenu === 'assetPackages'}" @click="activeMenu = 'assetPackages'">йҰғж‘қ з’§еӢӘйӘҮйҚ–е‘°з№Қй’Җ?/div>
        <div class="menu-item" :class="{active: activeMenu === 'import'}" @click="activeMenu = 'import'">йҰғж‘ӣ йҸҒзүҲеөҒзҖөз…ҺеҸҶ</div>
      </div>

      <!-- ж¶“иҜІе”ҙзҖ№?-->
      <div class="main">
        <div class="header">
          <div style="font-size: 14px; color: #606266">
            <span style="margin-right: 20px">йҰғжҗ® {{ currentDate }}</span>
            <span>иӨ°ж’іеў йҗўг„Ұеҹӣ: <strong>{{ currentUser.username }}</strong></span>
          </div>
          <div style="display: flex; align-items: center; gap: 15px;">
            <!-- й–«ж°ұз…Ўй–ҫеҶ®ж‘Ҹ -->
            <div class="notification-bell" @click="showNotifications = !showNotifications" style="position: relative; cursor: pointer;">
              <span style="font-size: 20px;">йҰғж•Ӯ</span>
              <span v-if="unreadCount > 0" class="notification-badge" style="position: absolute; top: -5px; right: -5px; background: #f56c6c; color: white; font-size: 12px; padding: 2px 6px; border-radius: 10px;">{{ unreadCount }}</span>
              <!-- й–«ж°ұз…Ўж¶“е¬«еӘәй—ҲгҲЎжҫҳ -->
              <div v-if="showNotifications" class="notification-panel" style="position: absolute; top: 40px; right: 0; width: 350px; background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 100; max-height: 400px; overflow-y: auto;" @click.stop>
                <div style="padding: 15px; border-bottom: 1px solid #ebeef5; display: flex; justify-content: space-between; align-items: center;">
                  <strong>й–«ж°ұз…ЎеЁ‘е ҹдј…</strong>
                  <span v-if="unreadCount > 0" style="color: #409eff; cursor: pointer; font-size: 12px;" @click="markAllRead">йҚҸг„©е„ҙе®ёиҢ¶оҮ°</span>
                </div>
                <div v-if="notifications.length === 0" style="padding: 30px; text-align: center; color: #909399;">
                  йҸҶеӮӣжЈӨй–«ж°ұз…Ў
                </div>
                <div v-for="(notif, idx) in notifications" :key="idx" style="padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer;" :style="{background: notif.status === 'unread' ? '#f5f7fa' : 'white'}" @click="viewNotification(notif)">
                  <div style="font-weight: 500; margin-bottom: 5px;">{{ notif.title }}</div>
                  <div style="font-size: 12px; color: #666; white-space: pre-line; max-height: 60px; overflow: hidden;">{{ notif.content }}</div>
                  <div style="font-size: 11px; color: #999; margin-top: 5px;">{{ notif.time }}</div>
                </div>
              </div>
            </div>
            <span class="tag tag-primary" style="margin-right: 10px">{{ currentUser.roleText }}</span>
            <button class="btn btn-sm btn-danger" @click="logout">й–«вӮ¬йҚ‘?/button>
          </div>
        </div>

        <div class="content">
          <!-- еҰ—е ңж¬ўйҚ’жҘ„гҖғ -->
          <div v-if="activeMenu === 'list'">
            <!-- зјҒзҶ»о…ёйҚ—пј„еў– - йҺёеӨӢжҹҠйҗЁеӢӘз¬ҹйҚ”пҝ вӮ¬жҳҸз·«йҗһе—ҡР’ -->
            <div class="stats-cards">
              <div class="stat-card">
                <div class="number">{{ stats.total }}</div>
                <div class="label">йҚҸг„©е„ҙеҰ—е ңж¬ў</div>
              </div>
              <div class="stat-card warning">
                <div class="number">{{ stats.pending }}</div>
                <div class="label">еҜ°е‘ӯоҳ©йҗһ?з»”е¬«о”Қж¶“?/div>
              </div>
              <div class="stat-card primary">
                <div class="number">{{ stats.supervision }}</div>
                <div class="label">зҒһгғ§е®ійҗ©жҲ жҪұж¶“?/div>
              </div>
              <div class="stat-card success">
                <div class="number">{{ stats.finished }}</div>
                <div class="label">зҒһгғ§е®ізҖ№еұҫеһҡ-зјҒж’ҙжҪ«</div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>еҰ—е ңж¬ўйҚ’жҘ„гҖғ</h3>
                <div>
                  <button class="btn btn-primary btn-sm mr-10" @click="activeMenu = 'create'">+ йҸӮжқҝо–ғеҰ—е ңж¬ў</button>
                  <button class="btn btn-success btn-sm" @click="activeMenu = 'import'">йҰғж‘ӣ йҺөеҪ’еҷәзҖөз…ҺеҸҶ</button>
                </div>
              </div>

              <div class="search">
                <select v-model="filter.type" style="width: 120px">
                  <option value="">йҚҸг„©е„ҙз»«иҜІзҖ·</option>
                  <option value="litigation">з’ҮеӨҺоҶ“еҰ—е ңж¬ў</option>
                  <option value="execution">йҺөСҶо”‘еҰ—е ңж¬ў</option>
                  <option value="preservation">з’ҮеӨүз№ҡеҰ—е ңж¬ў</option>
                </select>
                <select v-model="filter.status" style="width: 140px">
                  <option value="">йҚҸг„©е„ҙйҗҳиҲөвӮ¬?/option>
                  <option value="pending">еҜ°е‘ӯоҳ©йҗһ?еҜ°е‘ҜзҸӣеҰ—?/option>
                  <option value="filing">е®ёиҢ¬зҸӣеҰ—?еҜ°е‘¬з№ҡйҚҸ?/option>
                  <option value="preservation">ж·ҮжҝҶеҸҸж¶“?еҜ°е‘ӯоҳ©йҗһ?/option>
                  <option value="mediation">з’ӢеҶӯР’зјҒж’ҙжҪ«-еҜ°е‘ӯйҘұз»ҫ?/option>
                  <option value="judgment">йҚ’гӮ…е–…зјҒж’ҙжҪ«-еҜ°е‘ӯйҘұз»ҫ?/option>
                  <option value="closed">е®ёиҢ¬зІЁеҰ—?зҒһгғ§е®ійҗ©жҲ жҪұ</option>
                  <option value="execution">йҺөСҶо”‘ж¶“о…ЁзҙҷеҜ®е“„еҹ—й”ӣ?/option>
                  <option value="finished">еҰ—е ңж¬ўзјҒж’ҙжҪ«</option>
                </select>
                <select v-model="filter.hasExecution" style="width: 140px">
                  <option value="">йҸ„оҲҡжғҒйҚ—еҝ”еўҪз»”е¬«о”Қ</option>
                  <option value="yes">йҸ„?/option>
                  <option value="no">йҚҡ?/option>
                </select>
                <input v-model="filter.keyword" placeholder="йҺјж»…еӮЁеҰ—е қеҪҝ/жҝ®ж’іжӮ•/йҹ¬оӮЎе”Өз’ҮдҪёеҪҝ" style="width: 220px">
                <button class="btn btn-primary btn-sm" @click="handleSearch">йҰғж”і йҸҢгғЁоҮ—</button>
                <button class="btn btn-default btn-sm" @click="resetFilter">й–Іе¶Үз–Ҷ</button>
              </div>

              <table>
                <thead>
                  <tr>
                    <th>еҰ—е қеҪҝ</th>
                    <th>з»«иҜІзҖ·</th>
                    <th>зҖ№гҲЎеҹӣжҝ®ж’іжӮ•</th>
                    <th>йҹ¬оӮЎе”Өз’ҮдҪёеҪҝ</th>
                    <th>з’ӢеҶӯР’йҗҳиҲөвӮ¬?/th>
                    <th>йҚ—еҝ”еўҪз»”е¬«о”Қ</th>
                    <th>йҺөСҶо”‘еҰ—е қеҪҝ</th>
                    <th>йҺҝе¶„з¶”</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="item in paginatedCases" :key="item.id">
                    <td><strong>{{ item.caseNo }}</strong></td>
                    <td><span class="tag" :class="getTypeClass(item.caseType)">{{ getTypeText(item.caseType) }}</span></td>
                    <td>{{ item.customerName }}</td>
                    <td>{{ maskIdcard(item.customerIdcard) }}</td>
                    <td>
                      <span class="tag" :class="getActualCaseStatus(item).class">
                        {{ getActualCaseStatus(item).text }}
                      </span>
                    </td>
                    <td><span class="tag" :class="item.hasExecutionCase ? 'tag-success' : 'tag-info'">{{ item.hasExecutionCase ? 'йҸ„? : 'йҚҡ? }}</span></td>
                    <td>{{ item.execution?.caseNumber || '-' }}</td>
                    <td>
                      <button class="btn btn-primary btn-sm" @click="viewDetail(item)">йҸҢгғ§ж№…</button>
                      <button class="btn btn-warning btn-sm" style="margin-left: 5px" @click="editCase(item)">зјӮж ¬з·«</button>
                    </td>
                  </tr>
                </tbody>
              </table>

              <div class="pagination">
                <span class="fade">йҚҸ?{{ filteredCases.length }} йҸү?/span>
                <button class="page-btn" :disabled="page.current === 1" @click="page.current--">ж¶“е©Ғз«ҙжӨӨ?/button>
                <button class="page-btn active">{{ page.current }}</button>
                <button class="page-btn" :disabled="page.current >= page.total" @click="page.current++">ж¶“е¬©з«ҙжӨӨ?/button>
                <select v-model="page.size" style="width: 80px">
                  <option :value="10">10йҸү?жӨӨ?/option>
                  <option :value="20">20йҸү?жӨӨ?/option>
                  <option :value="50">50йҸү?жӨӨ?/option>
                </select>
              </div>
            </div>
          </div>

          <!-- еҰ—е ңж¬ўз’ҮпёҪе„ҸеҜ®еңӯзҚҘ -->
          <div v-if="showDetail && selectedCase" class="modal-overlay" @click.self="showDetail = false">
            <div class="modal-content">
              <div class="modal-header">
                <h3>еҰ—е ңж¬ўз’ҮпёҪе„Ҹ - {{ selectedCase.caseNo }}</h3>
                <button class="close-btn" @click="showDetail = false">&times;</button>
              </div>
              <div class="modal-body">
                <div class="tabs">
                  <div class="tab" :class="{active: detailTab === 'basic'}" @click="detailTab = 'basic'">йҚ©зғҳж№°ж·Үв„ғдј…</div>
                  <div class="tab" :class="{active: detailTab === 'filing'}" @click="detailTab = 'filing'">з»”е¬«о”Қж¶“еәўеўҪж·Ү?/div>
                  <div class="tab" :class="{active: detailTab === 'judgment'}" @click="detailTab = 'judgment'">з’ӢеҶӯР’/йҚ’гӮ…е–…</div>
                  <div class="tab" :class="{active: detailTab === 'repayment'}" @click="detailTab = 'repayment'">зҒһгғ§е®ійҗ©жҲ жҪұ</div>
                  <div class="tab" :class="{active: detailTab === 'execution'}" @click="detailTab = 'execution'" v-if="selectedCase.hasExecutionCase">йҺөСҶо”‘еҰ—е ңж¬ў</div>
                </div>

                <!-- йҚ©зғҳж№°ж·Үв„ғдј… -->
                <div v-if="detailTab === 'basic'">
                  <div class="detail-section">
                    <h4>еҰ—е ңж¬ўж·Үв„ғдј…</h4>
                    <div class="detail-grid">
                      <div class="detail-item"><span class="label">еҰ—е ңж¬ўжҗҙеҝ“еҪҝ:</span><span class="value">{{ selectedCase.caseNo }}</span></div>
                      <div class="detail-item"><span class="label">еҰ—е ңж¬ўз»«иҜІзҖ·:</span><span class="value">{{ getTypeText(selectedCase.caseType) }}</span></div>
                      <div class="detail-item"><span class="label">зҖ№гҲЎеҹӣPIN:</span><span class="value">{{ selectedCase.customerJdPin || '-' }}</span></div>
                      <div class="detail-item"><span class="label">йҚһоҲҷз«ҙз’Үе——еҹҶйҗ®?</span><span class="value">{{ selectedCase.uniqueCode || '-' }}</span></div>
                    </div>
                  </div>
                  <div class="detail-section">
                    <h4>иӨ°ж’Із°ЁжөңиҪ°дҝҠйҺӯ?/h4>
                    <div class="detail-grid">
                      <div class="detail-item"><span class="label">жҝ®ж’іжӮ•:</span><span class="value">{{ selectedCase.customerName }}</span></div>
                      <div class="detail-item"><span class="label">йҺ¬СғеҹҶ:</span><span class="value">{{ selectedCase.gender || '-' }}</span></div>

          closed: 'е®ёиҢ¬зІЁеҰ—?зҒһгғ§е®ійҗ©жҲ жҪұж¶“?, 
          execution: 'йҺөСҶо”‘ж¶“о…ЁзҙҷеҜ®е“„еҹ—зҒһгғ§е®ій”ӣ?, 
          finished: 'еҰ—е ңж¬ўзјҒж’ҙжҪ«' 
        }[s] || s);
        const getStatusClass = (s) => ({ 
          pending: 'tag-info', 
          filing: 'tag-info',
          preservation: 'tag-warning',
          mediation: 'tag-warning', 
          judgment: 'tag-warning',
          closed: 'tag-primary', 
          execution: 'tag-danger', 
          finished: 'tag-success' 
        }[s] || 'tag-info');
        // з’Ғпј„з•»еҰ—е ңж¬ўзҖ№зӮәжӘҜйҗҳиҲөвӮ¬дҫҠзҙҷйҚ©иҪ°з°¬йҸҲоҒ„йҘұз»ҫп№ӮеҷҫжЈ°жҝ“зҙҡ
        const getActualCaseStatus = (c) => {
          const remaining = calculatedRemainingForCase(c);
          if (remaining <= 0 && (c.judgment?.closeTypeCategory || c.judgmentInfo?.judgmentAmount)) {
            return { text: 'зҒһгғ§е®ізҖ№еұҫеһҡ-еҰ—е ңж¬ўзјҒж’ҙжҪ«', class: 'tag-success', finished: true };
          }
          return { text: getStatusText(c.status), class: getStatusClass(c.status), finished: false };
        };
        const getInstallmentStatusText = (s) => ({ pending: 'еҜ°е‘®ж•®жө ?, paid: 'е®ёеҸүж•®жө ?, overdue: 'е®ёжҹҘвӮ¬зӮ¬ж№Ў' }[s] || s);
        const getInstallmentStatusClass = (s) => ({ pending: 'tag-info', paid: 'tag-success', overdue: 'tag-danger' }[s] || 'tag-info');
        
        const maskIdcard = (idcard) => {
          if (!idcard) return '-';
          if (idcard.length === 18) {
            return idcard.slice(0, 6) + '********' + idcard.slice(14);
          }
          return idcard.slice(0, 4) + '****' + idcard.slice(-4);
        };

        const maskPhone = (phone) => {
          if (!phone) return '-';
          return phone.slice(0, 3) + '****' + phone.slice(-4);
        };

        const formatMoney = (amount) => {
          if (amount === null || amount === undefined || amount === '') return '-';
          return 'жҘј' + parseFloat(amount).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        // ==================== v2.0 йҸӮжқҝо–ғйҸӮи§„зЎ¶ ====================
        
        // й–«ж°ұз…Ўйҗ©зЁҝеҸ§йҸӮи§„зЎ¶
        const markAllRead = () => {
          notifications.value.forEach(n => n.status = 'read');
          unreadCount.value = 0;
        };
        
        const viewNotification = (notif) => {
          notif.status = 'read';
          if (notif.caseIds && notif.caseIds.length > 0) {
            // йҺөж’ізҙ‘еҰ—е ңж¬ўз’ҮпёҪе„ҸеҜ®еңӯзҚҘ
            const relatedCases = cases.value.filter(c => notif.caseIds.includes(c.id));
            if (relatedCases.length > 0) {
              // йҸ„еү§гҒҡйҗ©зЁҝеҸ§еҰ—е ңж¬ўйҚ’жҘ„гҖғ
              alert(`йҗ©зЁҝеҸ§еҰ—е ңж¬ўй”ӣжӯ•n${relatedCases.map(c => `${c.caseNo} - ${c.customerName}`).join('\n')}`);
            }
          }
        };

        // з’§еӢӘйӘҮйҚ–е‘ҜжөүйҚҸиҷ«жҹҹеЁү?        const viewAssetPackage = (pkg) => {
          selectedAssetPackage.value = pkg;
        };
        
        const closeAssetPackageDetail = () => {
          selectedAssetPackage.value = null;
        };

        // жқ©жЁ»оғҷз’ҒвҖіеһқйҗўзҶёеһҡ
        const generateRepaymentPlan = () => {
          const { totalPeriods, repaymentDay, repaymentMethod, firstDueDate, interestRate, totalAmount } = repaymentConfig;
          
          if (!firstDueDate || !totalAmount) {
            alert('з’Үеі°пҪһйҚҗж¬“оӣ»еЁҶВӨз№•еЁҶзӮ¬жЈ©йҚңеұҫвӮ¬е©ҡеҷҫжЈ°?);
            return;
          }

          const installments = [];
          const monthlyRate = (interestRate || 0) / 100 / 12;
          
          if (repaymentMethod === 'equal_interest') {
            // з»ӣеӨҗо–ӮйҸҲо„Ғдј…
            const monthlyPayment = monthlyRate > 0
              ? (totalAmount * monthlyRate * Math.pow(1 + monthlyRate, totalPeriods)) / 
                (Math.pow(1 + monthlyRate, totalPeriods) - 1)
              : totalAmount / totalPeriods;
            
            let remaining = totalAmount;
            for (let i = 1; i <= totalPeriods; i++) {
              const interest = remaining * monthlyRate;
              const principal = monthlyPayment - interest;
              remaining -= principal;
              
              const date = new Date(firstDueDate);
              date.setMonth(date.getMonth() + i - 1);
              
              installments.push({
                periodNo: i,
                dueDate: date.toISOString().split('T')[0],
                dueAmount: monthlyPayment.toFixed(2),
                principal: principal.toFixed(2),
                interest: interest.toFixed(2),
                remainingPrincipal: Math.max(0, remaining).toFixed(2)
              });
            }
          } else if (repaymentMethod === 'equal_principal') {
            // з»ӣеӨҗо–ӮйҸҲо„„еҷҫ
            const monthlyPrincipal = totalAmount / totalPeriods;
            let remaining = totalAmount;
            
            for (let i = 1; i <= totalPeriods; i++) {
              const interest = remaining * monthlyRate;
              const payment = monthlyPrincipal + interest;
              remaining -= monthlyPrincipal;
              
              const date = new Date(firstDueDate);
              date.setMonth(date.getMonth() + i - 1);
              
              installments.push({
                periodNo: i,
                dueDate: date.toISOString().split('T')[0],
                dueAmount: payment.toFixed(2),
                principal: monthlyPrincipal.toFixed(2),
                interest: interest.toFixed(2),
                remainingPrincipal: Math.max(0, remaining).toFixed(2)
              });
            }
          } else {
            // й‘·оҒ„з•ҫж¶”еӨҠй’©йҚ§еӣ§еһҺй–°?            const avgAmount = totalAmount / totalPeriods;
            for (let i = 1; i <= totalPeriods; i++) {
              const date = new Date(firstDueDate);
              date.setMonth(date.getMonth() + i - 1);
              
              installments.push({
                periodNo: i,
                dueDate: date.toISOString().split('T')[0],
                dueAmount: avgAmount.toFixed(2),
                principal: avgAmount.toFixed(2),
                interest: '0.00',
                remainingPrincipal: (totalAmount - avgAmount * i).toFixed(2)
              });
            }
          }
          
          generatedInstallments.value = installments;
          // йҚҡеұҫжӨӮйҸҮеӯҳжҹҠзҗӣг„ҘеҙҹйҗЁеӢ«еһҺйҸҲзҶ·еһӘзҗӣ?          form.repayment.installments = installments.map(inst => ({
            dueDate: inst.dueDate,
            dueAmount: inst.dueAmount,
            paidAmount: '',
            status: 'pending'
          }));
        };

        // OCRз’Үе——еҹҶ
        const handleOcrUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              ocrImage.value = event.target.result;
              // еҰҜв„ғе«ҷOCRз’Үе——еҹҶзјҒж’ҙзҒү
              ocrResult.value = {
                caseNo: 'JD-2024-' + Math.floor(Math.random() * 1000),
                customerName: 'з’Үе——еҹҶжҝ®ж’іжӮ•',
                customerIdcard: '1101011985' + Math.floor(Math.random() * 1000000000),
                amount: '50000'
              };
            };
            reader.readAsDataURL(file);
          }
        };
        
        const applyOcrResult = () => {
          if (ocrResult.value) {
            form.caseNo = ocrResult.value.caseNo || form.caseNo;
            form.customerName = ocrResult.value.customerName || form.customerName;
            form.customerIdcard = ocrResult.value.customerIdcard || form.customerIdcard;
            alert('OCRз’Үе——еҹҶзјҒж’ҙзҒүе®ёжҸ’пҪһйҚҸе‘ӯеҹҢзҗӣг„Ҙеҙҹ');
          }
        };

        return {
          // йҚ©иҷ№о”…йҸҒзүҲеөҒ
          isLoggedIn, loginForm, activeMenu, editTab, detailTab, showDetail, selectedCase, uploadFile, isEditing,
          currentUser, currentDate, filter, page, stats, form, cases, filteredCases, paginatedCases,
          calculatedMediationAmount, calculatedJudgmentAmount, calculatedResultAmount, calculatedRemaining, calculatedRemainingForCase, calculatedResultAmountForCase,
          formToApiData, apiDataToForm, getActualCaseStatus,
          // v2.0 йҸӮжқҝо–ғйҸҒзүҲеөҒ
          showNotifications, unreadCount, notifications,
          assetPackages, selectedAssetPackage,
          repaymentConfig, generatedInstallments,
          ocrImage, ocrText, ocrResult,
          // v2.0 йҸӮжқҝо–ғйҸӮи§„зЎ¶
          markAllRead, viewNotification,
          viewAssetPackage, closeAssetPackageDetail,
          generateRepaymentPlan,
          handleOcrUpload, applyOcrResult,
          // йҚ©иҷ№о”…йҸӮи§„зЎ¶
          handleLogin, logout, viewDetail, editCase, editFromDetail, handleSave, addInstallment, removeInstallment,
          handleFileChange, handleImport, handleSearch, resetFilter,
          getTypeText, getTypeClass, getStatusText, getStatusClass, getInstallmentStatusText, getInstallmentStatusClass,
          maskIdcard, maskPhone, formatMoney
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
